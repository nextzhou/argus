pre-commit:
  commands:
    lint:
      run: make lint || { echo 'Lint failed. Run `make fix` and retry commit.' >&2; exit 1; }
    test:
      run: make test

commit-msg:
  commands:
    conventional-commits:
      run: |
        grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .{1,72}$' {1}
