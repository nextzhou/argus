version: "2"

run:
  go: "1.26"
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - gocritic
    - revive
    - misspell
    - nolintlint
    - unconvert
    - unparam
    - unused
    - gochecknoinits
    - gochecknoglobals
    - noctx
    - errorlint
    - testifylint
    - gosec
    - forbidigo
  exclusions:
    warn-unused: true
  settings:
    nolintlint:
      require-explanation: true
      require-specific: true
    forbidigo:
      forbid:
        - pattern: 'fmt\.Print'
          msg: use os.Stdout.WriteString or slog instead of fmt.Print*

formatters:
  enable:
    - goimports
