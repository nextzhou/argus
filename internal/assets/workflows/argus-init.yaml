version: v0.1.0
id: argus-init
description: "Initialize Argus for the project"

jobs:
  - id: generate_rules
    skill: argus-generate-rules
    prompt: "Analyze the project structure and generate rules covering technical architecture, coding conventions, and domain context."

  - id: setup_git_hooks
    prompt: "Set up a git pre-commit hook for the project so lint checks run automatically before each commit."

  - id: setup_gitignore
    prompt: "Ensure .gitignore includes the Argus temporary paths .argus/pipelines/, .argus/logs/, and .argus/tmp/."

  - id: generate_workflows
    prompt: "Generate workflow files suited to this project under .argus/workflows/. When finished, run argus toolbox touch-timestamp .argus/data/init_workflows_generated."

  - id: generate_invariant_examples
    prompt: "Create 1-2 custom invariant examples for this project under .argus/invariants/."
