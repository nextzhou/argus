version: v0.1.0
id: argus-project-init
order: 20
description: "The project has a usable Argus collaboration model"
auto: session_start

check:
  - shell: 'test -d .argus/rules && test "$(ls .argus/rules/)"'
    description: "Project rules have been generated"
  - shell: "test -f CLAUDE.md || test -f AGENTS.md"
    description: "An agent-native rules file exists"
  - shell: "test -f .argus/data/project-init/survey.yaml"
    description: "Repository survey results are recorded"
  - shell: "test -f .argus/data/project-init/plan.yaml && grep -Eq '^status:[[:space:]]*approved$' .argus/data/project-init/plan.yaml && grep -Eq '^approval_mode:[[:space:]]*explicit_user_confirmation$' .argus/data/project-init/plan.yaml && grep -Eq '^planned_rule_files:' .argus/data/project-init/plan.yaml && grep -Eq '^planned_workflow_ids:' .argus/data/project-init/plan.yaml && grep -Eq '^planned_invariant_ids:' .argus/data/project-init/plan.yaml"
    description: "Approved initialization decisions are recorded with explicit user confirmation"
  - shell: 'test "$(ls .argus/workflows/*.yaml 2>/dev/null | grep -v "/argus-")"'
    description: "Project-specific workflows have been generated"
  - shell: 'test "$(ls .argus/invariants/*.yaml 2>/dev/null | grep -v "/argus-")"'
    description: "Project-specific invariants have been generated"
  - shell: "git rev-parse --is-inside-work-tree >/dev/null 2>&1 && ! git check-ignore -q .argus/data/project-init/verification.yaml"
    description: "Project-managed .argus files are not ignored by git"
  - shell: "git rev-parse --is-inside-work-tree >/dev/null 2>&1 && git check-ignore -q .argus/pipelines/.probe && git check-ignore -q .argus/logs/.probe && git check-ignore -q .argus/tmp/.probe"
    description: "Argus runtime state remains ignored by git"
  - shell: "test -f .argus/data/project-init/verification.yaml"
    description: "Initialization verification has been recorded"

prompt: |
  Run `argus workflow start argus-project-init` to build the project-specific Argus collaboration model. Follow the workflow's approval checkpoints before making repo-managed changes.

workflow: argus-project-init
