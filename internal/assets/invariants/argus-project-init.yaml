version: v0.1.0
id: argus-project-init
description: "Project has Argus installed"
auto: session_start

check:
  - shell: "test -d .argus"
    description: "Argus directory exists"

prompt: |
  This project does not have Argus installed.

  Before answering the user's original request or exploring the repository, stop and ask the user to choose how to proceed.

  Prefer using the agent's question tool or other structured choice input tool to present these options. If no such tool is available, ask the same question in a normal text response.

  Offer exactly these options:
  1. Install Argus now, using `argus install --yes` or the `argus-install` skill for guided setup.
  2. Explain what Argus is, why this reminder appeared, and what installation would change, using the `argus-intro` skill.
  3. Ignore this reminder for now and continue the current task without installing Argus.

  Do not answer the user's original task until the user chooses option 1, 2, or 3.

  If the user chooses option 3, continue the task normally and do not repeat this reminder again in the same conversation unless the user asks about it.

  Do not install Argus automatically without the user's confirmation.
workflow: ""
